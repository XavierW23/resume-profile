<svg xmlns="http://www.w3.org/2000/svg" width="920" height="560" viewBox="0 0 920 560" role="img" aria-labelledby="title desc">
  <title id="title">Runtime Supervisor architecture diagram</title>
  <desc id="desc">Runtime supervision flow from automation runner to heartbeat, supervisor, failure classification, recovery action, logging, and reporting.</desc>
  <rect width="920" height="560" fill="#ffffff"/>
  <rect x="24" y="24" width="872" height="512" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="56" y="66" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Runtime Supervisor</text>
  <text x="56" y="94" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="14">Monitoring and recovery layer for long-running AI/browser automation</text>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <g font-family="Arial, Helvetica, sans-serif" font-size="14">
    <rect x="70" y="150" width="170" height="72" rx="8" fill="#0f172a"/>
    <text x="98" y="181" fill="#ffffff" font-weight="700">Automation Runner</text>
    <text x="98" y="203" fill="#cbd5e1">task execution</text>

    <rect x="320" y="132" width="170" height="72" rx="8" fill="#0f766e"/>
    <text x="356" y="163" fill="#ffffff" font-weight="700">Heartbeat</text>
    <text x="356" y="185" fill="#ccfbf1">last seen + status</text>

    <rect x="320" y="238" width="170" height="72" rx="8" fill="#1d4ed8"/>
    <text x="354" y="269" fill="#ffffff" font-weight="700">Runtime Log</text>
    <text x="354" y="291" fill="#dbeafe">trace + context</text>

    <rect x="580" y="185" width="170" height="92" rx="8" fill="#312e81"/>
    <text x="622" y="219" fill="#ffffff" font-weight="700">Supervisor</text>
    <text x="609" y="241" fill="#e0e7ff">detect stale state</text>
    <text x="609" y="261" fill="#e0e7ff">classify failures</text>

    <rect x="580" y="352" width="170" height="72" rx="8" fill="#854d0e"/>
    <text x="616" y="383" fill="#ffffff" font-weight="700">Recovery</text>
    <text x="616" y="405" fill="#fef3c7">restart or alert</text>

    <rect x="160" y="352" width="190" height="72" rx="8" fill="#365314"/>
    <text x="198" y="383" fill="#ffffff" font-weight="700">State Report</text>
    <text x="198" y="405" fill="#dcfce7">operator visibility</text>

    <line x1="240" y1="186" x2="320" y2="168" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
    <line x1="240" y1="198" x2="320" y2="274" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
    <line x1="490" y1="168" x2="580" y2="220" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
    <line x1="490" y1="274" x2="580" y2="242" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
    <line x1="665" y1="277" x2="665" y2="352" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
    <path d="M580 388 C500 420 430 418 350 388" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
    <path d="M160 388 C95 345 80 270 110 222" fill="none" stroke="#334155" stroke-width="2" marker-end="url(#arrow2)"/>
  </g>
</svg>
